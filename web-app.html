<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>赛博放生局 · 电子河流</title>
<style>
/* ==================== Reset & Base ==================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; width: 100%; }
body {
  font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", sans-serif;
  color: var(--ink);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow: hidden;
  position: relative;
}
button { font-family: inherit; border: none; background: none; cursor: pointer; color: inherit; }
textarea, input { font-family: inherit; }

/* ==================== Tokens ==================== */
:root {
  --teal: #2c8a7a;
  --teal-deep: #1f3a36;
  --teal-light: #d4e8e2;
  --coral: #ed7d5b;
  --coral-soft: #fce8df;
  --lake: #3e7a96;
  --paper: #faf6ec;
  --paper-warm: #f5ede0;
  --ink: #2a2a2a;
  --ink-soft: #555;
  --ink-mute: #999;
  --line: #e0ddd5;
  --line-soft: #eeebe5;
  --glass-bg: rgba(255, 255, 255, 0.78);
  --glass-bg-strong: rgba(255, 255, 255, 0.88);
  --glass-border: rgba(255, 255, 255, 0.55);
  --shadow-glass: 0 12px 40px rgba(31, 58, 54, 0.18), 0 4px 12px rgba(31, 58, 54, 0.08);
  --shadow-card: 0 2px 8px rgba(31, 58, 54, 0.06);
}

.serif { font-family: "Kaiti SC", "STKaiti", "Songti SC", "STSong", serif; }
.mono { font-family: "SF Mono", "Monaco", "Menlo", "Consolas", monospace; letter-spacing: 0.02em; }

/* ==================== Water Background ==================== */
.water-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(212, 232, 226, 0.55) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 90%, rgba(62, 122, 150, 0.35) 0%, transparent 55%),
    linear-gradient(160deg, #d4e8e2 0%, #a9d2c5 35%, #6fae9c 70%, #3e7a7e 100%);
  overflow: hidden;
}
.water-bg::before,
.water-bg::after {
  content: '';
  position: absolute;
  inset: -50%;
  background:
    radial-gradient(ellipse 60% 40% at 30% 40%, rgba(255,255,255,0.18), transparent 60%),
    radial-gradient(ellipse 50% 35% at 70% 60%, rgba(255,255,255,0.12), transparent 60%);
  animation: waterShimmer 18s ease-in-out infinite alternate;
}
.water-bg::after {
  animation: waterShimmer2 24s ease-in-out infinite alternate;
  background:
    radial-gradient(ellipse 45% 30% at 60% 30%, rgba(212,232,226,0.22), transparent 60%),
    radial-gradient(ellipse 55% 40% at 25% 70%, rgba(212,232,226,0.18), transparent 60%);
  opacity: 0.7;
}
@keyframes waterShimmer {
  0%   { transform: translate(0, 0) rotate(0deg); }
  100% { transform: translate(4%, -3%) rotate(2deg); }
}
@keyframes waterShimmer2 {
  0%   { transform: translate(0, 0) rotate(0deg); }
  100% { transform: translate(-3%, 4%) rotate(-2deg); }
}

/* Subtle ripple lines */
.water-ripples {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background-image:
    repeating-linear-gradient(
      90deg,
      transparent 0px,
      transparent 80px,
      rgba(255,255,255,0.04) 80px,
      rgba(255,255,255,0.04) 81px,
      transparent 81px,
      transparent 160px
    ),
    repeating-linear-gradient(
      0deg,
      transparent 0px,
      transparent 120px,
      rgba(255,255,255,0.03) 120px,
      rgba(255,255,255,0.03) 121px,
      transparent 121px,
      transparent 240px
    );
  animation: rippleDrift 30s linear infinite;
}
@keyframes rippleDrift {
  0%   { transform: translate(0, 0); }
  100% { transform: translate(80px, 0); }
}

/* ==================== App Shell ==================== */
.app-shell {
  position: relative;
  z-index: 2;
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ==================== Top Nav ==================== */
.top-nav {
  flex-shrink: 0;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  background: rgba(255, 255, 255, 0.55);
  backdrop-filter: blur(20px) saturate(140%);
  -webkit-backdrop-filter: blur(20px) saturate(140%);
  border-bottom: 1px solid rgba(255, 255, 255, 0.4);
  position: relative;
  z-index: 10;
}
.nav-logo {
  font-family: "Kaiti SC", "STKaiti", "Songti SC", serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--teal-deep);
  letter-spacing: 0.12em;
  display: flex;
  align-items: center;
  gap: 8px;
}
.nav-logo .logo-mark {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--teal), var(--teal-deep));
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  box-shadow: 0 2px 8px rgba(31, 58, 54, 0.25);
}
.nav-toggle {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: rgba(255, 255, 255, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.6);
  border-radius: 99px;
  padding: 4px;
  box-shadow: var(--shadow-card);
}
.nav-toggle .nav-pill {
  padding: 7px 22px;
  font-size: 13px;
  color: var(--ink-soft);
  border-radius: 99px;
  letter-spacing: 0.08em;
  transition: all 0.25s ease;
  font-weight: 500;
}
.nav-toggle .nav-pill.active {
  background: linear-gradient(135deg, var(--teal), var(--teal-deep));
  color: #fff;
  box-shadow: 0 2px 8px rgba(31, 58, 54, 0.25);
}
.nav-right {
  display: flex;
  align-items: center;
  gap: 12px;
}
.nav-avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--teal-light), var(--teal));
  color: var(--teal-deep);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
  box-shadow: 0 2px 6px rgba(31, 58, 54, 0.18);
}
.nav-login-tag {
  font-size: 10px;
  color: var(--teal);
  background: rgba(212, 232, 226, 0.7);
  padding: 4px 10px;
  border-radius: 99px;
  letter-spacing: 0.08em;
  border: 1px solid rgba(44, 138, 122, 0.2);
}

/* ==================== View Container ==================== */
.view-container {
  flex: 1;
  position: relative;
  overflow: hidden;
  min-height: 0;
}
.view {
  position: absolute;
  inset: 0;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
  display: flex;
}
.view.active {
  opacity: 1;
  pointer-events: auto;
}

/* ==================== Release View ==================== */
.release-view {
  display: flex;
  width: 100%;
  height: 100%;
}

/* Water canvas (left, 60%) */
.water-canvas {
  flex: 0 0 60%;
  position: relative;
  overflow: hidden;
  min-height: 0;
}
.world-map {
  position: absolute;
  inset: 0;
  overflow: hidden;
  cursor: grab;
  touch-action: none;
  background: linear-gradient(180deg, rgba(207, 228, 221, 0.4) 0%, rgba(169, 210, 197, 0.5) 60%, rgba(127, 182, 164, 0.6) 100%);
}
.world-map.dragging { cursor: grabbing; }
.map-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  user-select: none;
  -webkit-user-select: none;
}

/* Water markers */
.water-marker { cursor: pointer; }
.water-marker circle.dot {
  fill: #3e7a96;
  stroke: #fff;
  stroke-width: 1.5;
  transition: r 0.2s ease;
}
.water-marker.lake circle.dot { fill: #2c8a7a; }
.water-marker.river circle.dot { fill: #2c8a7a; }
.water-marker.trench circle.dot { fill: #ed7d5b; }
.water-marker.selected circle.dot {
  fill: #ed7d5b;
  stroke: #fff;
  stroke-width: 2.5;
  r: 7;
}
.water-marker .pulse {
  fill: none;
  stroke: #ed7d5b;
  stroke-width: 1.2;
  opacity: 0;
}
.water-marker.selected .pulse { animation: mapPulse 1.8s ease-out infinite; }
@keyframes mapPulse {
  0% { r: 7; opacity: 0.7; }
  100% { r: 20; opacity: 0; }
}
.water-label {
  font-size: 9px;
  fill: #1f3a36;
  text-anchor: middle;
  pointer-events: none;
  font-family: "PingFang SC", sans-serif;
  font-weight: 600;
  paint-order: stroke;
  stroke: #faf6ec;
  stroke-width: 2.5;
  stroke-linejoin: round;
}
.water-marker.selected .water-label { fill: #ed7d5b; }

/* Hot bubbles */
.hot-bubbles {
  position: absolute;
  top: 16px; left: 16px; right: 16px;
  display: flex;
  gap: 6px;
  z-index: 5;
  flex-wrap: wrap;
  pointer-events: none;
}
.hot-bubble {
  pointer-events: auto;
  padding: 5px 12px;
  background: rgba(255,255,255,0.92);
  border: 1px solid #ed7d5b;
  border-radius: 99px;
  font-size: 11px;
  color: #ed7d5b;
  white-space: nowrap;
  transition: all 0.2s;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: inline-flex;
  align-items: center;
  gap: 4px;
  box-shadow: 0 2px 8px rgba(237, 125, 91, 0.15);
}
.hot-bubble:hover { transform: translateY(-1px); }
.hot-bubble:active { transform: scale(0.95); }
.hot-bubble.active { background: #ed7d5b; color: #fff; }

/* Map hint */
.map-hint {
  position: absolute;
  bottom: 80px; left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  color: rgba(31, 58, 54, 0.7);
  letter-spacing: 0.12em;
  pointer-events: none;
  z-index: 2;
  background: rgba(255,255,255,0.85);
  padding: 4px 14px;
  border-radius: 99px;
  transition: opacity 0.4s;
  white-space: nowrap;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.map-hint.hidden { opacity: 0; }

/* Creature layer */
.creature-layer {
  position: absolute;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  width: 38%;
  max-width: 280px;
  pointer-events: none;
  z-index: 3;
  transition: all 0.9s cubic-bezier(0.5, 0, 0.3, 1);
  filter: drop-shadow(0 8px 16px rgba(31, 58, 54, 0.25));
}
.creature-layer.released {
  bottom: -60%;
  opacity: 0;
  transform: translateX(-50%) scale(0.5);
}
.creature-layer svg {
  width: 100%;
  height: auto;
  animation: float 4s ease-in-out infinite;
}

/* River stat bar */
.river-stat {
  position: absolute;
  bottom: 16px; left: 16px;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 12px;
  color: var(--ink-soft);
  display: flex;
  flex-direction: column;
  gap: 4px;
  z-index: 4;
  border: 1px solid rgba(255,255,255,0.5);
  box-shadow: var(--shadow-card);
}
.river-stat .num { color: var(--teal); font-weight: 600; font-family: "SF Mono", "Monaco", monospace; }
.river-stat .stat-line { display: flex; align-items: center; gap: 6px; }
.river-stat .stat-line.muted { color: var(--ink-mute); font-size: 11px; }

/* Control panel (right, 40%) */
.control-panel {
  flex: 0 0 40%;
  padding: 24px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  display: flex;
  flex-direction: column;
}
.control-panel::-webkit-scrollbar { width: 4px; }
.control-panel::-webkit-scrollbar-thumb { background: rgba(31, 58, 54, 0.2); border-radius: 2px; }

.glass-panel {
  background: var(--glass-bg);
  backdrop-filter: blur(24px) saturate(160%);
  -webkit-backdrop-filter: blur(24px) saturate(160%);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: 28px;
  box-shadow: var(--shadow-glass);
  width: 100%;
  max-width: 460px;
  margin: 0 auto;
}

.section-block { margin-bottom: 22px; }
.section-block:last-child { margin-bottom: 0; }
.section-label {
  font-size: 12px;
  color: var(--ink-mute);
  margin-bottom: 10px;
  letter-spacing: 0.1em;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 6px;
}
.section-label .label-hint {
  font-size: 11px;
  color: var(--coral);
  font-weight: 400;
}
.section-label .label-num {
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--teal-light);
  color: var(--teal-deep);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 600;
}

/* Feeling input */
.feeling-row {
  display: flex;
  gap: 10px;
  align-items: flex-end;
  margin-bottom: 8px;
}
.mic-btn {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: rgba(212, 232, 226, 0.7);
  border: 1px solid var(--teal);
  color: var(--teal-deep);
  font-size: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.mic-btn:hover { transform: translateY(-1px); }
.mic-btn:active { transform: scale(0.92); }
.mic-btn.recording {
  background: var(--coral);
  border-color: var(--coral);
  color: #fff;
  animation: micPulse 1.2s ease-in-out infinite;
}
@keyframes micPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(237, 125, 91, 0.4); }
  50% { box-shadow: 0 0 0 10px rgba(237, 125, 91, 0); }
}
.feeling-textarea {
  flex: 1;
  min-height: 52px;
  max-height: 120px;
  padding: 14px 16px;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: rgba(255, 253, 247, 0.85);
  font-size: 14px;
  color: var(--ink);
  line-height: 1.5;
  resize: none;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.feeling-textarea:focus {
  border-color: var(--teal);
  box-shadow: 0 0 0 3px rgba(44, 138, 122, 0.12);
}
.feeling-textarea::placeholder { color: var(--ink-mute); opacity: 0.75; }
.feeling-hint {
  font-size: 11px;
  color: var(--ink-mute);
  line-height: 1.5;
}
.feeling-hint .dot { color: var(--coral); margin-right: 2px; }

/* Creature chips */
.creature-chips {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.chip {
  padding: 10px 16px;
  background: rgba(255, 253, 247, 0.7);
  border: 1px solid var(--line);
  border-radius: 99px;
  font-size: 13px;
  color: var(--ink-soft);
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.chip:hover { transform: translateY(-1px); border-color: var(--coral); }
.chip:active { transform: scale(0.96); }
.chip.coral.active {
  background: var(--coral);
  color: #fff;
  border-color: var(--coral);
  box-shadow: 0 4px 12px rgba(237, 125, 91, 0.35);
}

/* Feedback options */
.feedback-options {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.fb-opt {
  padding: 8px 14px;
  background: rgba(255, 253, 247, 0.7);
  border: 1px solid var(--line);
  border-radius: 10px;
  font-size: 12px;
  color: var(--ink-soft);
  transition: all 0.2s;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.fb-opt:hover { border-color: var(--teal); }
.fb-opt:active { transform: scale(0.95); }
.fb-opt.active {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}
.fb-date {
  width: 100%;
  margin-top: 10px;
  padding: 10px 14px;
  border: 1px solid var(--line);
  border-radius: 10px;
  font-size: 13px;
  color: var(--ink-soft);
  background: rgba(255, 253, 247, 0.85);
  outline: none;
  transition: border-color 0.2s;
}
.fb-date:focus { border-color: var(--teal); }

/* Release button */
.release-btn {
  width: 100%;
  margin-top: 6px;
  padding: 16px;
  background: linear-gradient(180deg, var(--coral) 0%, #d96d4d 100%);
  color: #fff;
  border-radius: 99px;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 0.12em;
  box-shadow: 0 6px 20px rgba(237, 125, 91, 0.4);
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.release-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(237, 125, 91, 0.5); }
.release-btn:active:not(:disabled) { transform: translateY(0); }
.release-btn:disabled {
  background: #d8d0bf;
  color: #faf6ec;
  box-shadow: none;
  cursor: not-allowed;
}
.release-btn::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  animation: shine 3.5s infinite;
}
@keyframes shine {
  0% { left: -100%; }
  60%, 100% { left: 100%; }
}

/* ==================== Archive View ==================== */
.archive-view {
  width: 100%;
  height: 100%;
  padding: 24px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.archive-view::-webkit-scrollbar { width: 6px; }
.archive-view::-webkit-scrollbar-thumb { background: rgba(31, 58, 54, 0.2); border-radius: 3px; }

.archive-panel {
  background: var(--glass-bg-strong);
  backdrop-filter: blur(28px) saturate(160%);
  -webkit-backdrop-filter: blur(28px) saturate(160%);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  padding: 32px;
  box-shadow: var(--shadow-glass);
  width: 100%;
  max-width: 1100px;
  display: flex;
  flex-direction: column;
  max-height: calc(100vh - 112px);
}

.user-bar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 16px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--line-soft);
}
.user-avatar {
  width: 48px; height: 48px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--teal-light), var(--teal));
  color: var(--teal-deep);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 600;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(31, 58, 54, 0.15);
}
.user-info { flex: 1; min-width: 0; }
.user-name { font-size: 16px; font-weight: 600; color: var(--ink); }
.user-id { font-size: 11px; color: var(--ink-mute); font-family: "SF Mono", "Monaco", monospace; letter-spacing: 0.04em; margin-top: 2px; }
.login-tag {
  font-size: 10px;
  color: var(--teal);
  background: var(--teal-light);
  padding: 4px 10px;
  border-radius: 99px;
  letter-spacing: 0.08em;
  flex-shrink: 0;
}

.stats-row {
  flex-shrink: 0;
  display: flex;
  padding: 22px 0;
  border-bottom: 1px solid var(--line-soft);
  gap: 16px;
}
.stat-item {
  flex: 1;
  text-align: center;
  padding: 8px 12px;
  background: rgba(255, 253, 247, 0.5);
  border-radius: 12px;
  transition: transform 0.2s;
}
.stat-item:hover { transform: translateY(-2px); }
.stat-num {
  font-family: "Kaiti SC", "STKaiti", "Songti SC", serif;
  font-size: 32px;
  line-height: 1;
  font-weight: 400;
}
.stat-num.teal { color: var(--teal); }
.stat-num.coral { color: var(--coral); }
.stat-label {
  font-size: 11px;
  color: var(--ink-mute);
  margin-top: 6px;
  letter-spacing: 0.06em;
}

.record-list {
  flex: 1;
  overflow-y: auto;
  padding: 20px 4px 8px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
  -webkit-overflow-scrolling: touch;
  align-content: start;
}
.record-list::-webkit-scrollbar { width: 4px; }
.record-list::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }

.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 80px 20px;
  color: var(--ink-mute);
  font-size: 14px;
  line-height: 2;
}

.record-card {
  background: rgba(255, 253, 247, 0.85);
  border: 1px solid var(--line-soft);
  border-radius: 14px;
  padding: 16px;
  transition: all 0.2s;
  backdrop-filter: blur(6px);

<script>
(function() {
  'use strict';

  // ==================== API Layer ====================
  const API_BASE = 'http://localhost:3000/api';
  const USE_API = true; // Set to true when backend is running

  async function apiRelease(data) {
    if (!USE_API) return localRelease(data);
    try {
      const res = await fetch(`${API_BASE}/release`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      if (!res.ok) {
        const errText = await res.text().catch(() => '');
        throw new Error(`后端错误 ${res.status}: ${errText.slice(0, 200)}`);
      }
      return await res.json();
    } catch (e) {
      console.error('[apiRelease] 失败:', e);
      alert('后端 API 连接失败，无法放生。请确认：\n1. 已在 server 目录运行 npm start\n2. 访问的是 http://localhost:3000\n3. 不是 file:// 打开的文件\n\n错误：' + e.message);

  function localGetDestiny(recordId) {
    const destinies = loadDestinies();
    const records = loadRecords();
    const record = records.find(r => r.id === recordId);
    if (!record) return { error: '记录不存在' };

    // 若命运轨迹不存在，则生成（第 0 段默认免费）
    if (!destinies[recordId]) {
      destinies[recordId] = {
        id: `DST-${recordId}`,
        recordId,
        segments: localGenerateDestinySegments(record.creature),
        unlockedIndices: [0],
        createdAt: Date.now()
      };
      saveDestinies(destinies);
    }
    const d = destinies[recordId];
    const unlocked = new Set(d.unlockedIndices);
    const segments = d.segments.map((seg, i) => {
      if (unlocked.has(i)) {
        return { ...seg, index: i, locked: false };
      }
      return { index: i, title: seg.title, emoji: seg.emoji, bg: seg.bg, locked: true, unlockType: i === 0 ? 'free' : 'ad' };
    });
    return {
      id: d.id,
      recordId: d.recordId,
      segments,
      totalSegments: segments.length,
      unlockedCount: segments.filter(s => !s.locked).length,
      allUnlocked: segments.every(s => !s.locked),
      adDurationMs: 15000
    };
  }

  function localUnlockDestiny(recordId, mode, index) {
    const destinies = loadDestinies();
    const d = destinies[recordId];
    if (!d) return { error: '命运轨迹不存在' };
    const total = d.segments.length;
    const current = new Set(d.unlockedIndices);

    if (mode === 'bundle') {
      if (current.size >= total) {
        return { ok: true, alreadyUnlocked: true, unlockedIndices: Array.from(current).sort((a,b)=>a-b) };
      }
      const all = Array.from({ length: total }, (_, i) => i);
      d.unlockedIndices = all;
      saveDestinies(destinies);
      return { ok: true, adId: 'LOCAL-AD-' + Date.now(), unlockedIndices: all, adWatched: true };
    }

    const idx = parseInt(index, 10);
    if (isNaN(idx) || idx < 0 || idx >= total) return { error: '无效索引' };
    if (current.has(idx)) {
      return { ok: true, alreadyUnlocked: true, unlockedIndices: Array.from(current).sort((a,b)=>a-b) };
    }
    current.add(idx);
    d.unlockedIndices = Array.from(current).sort((a,b)=>a-b);
    saveDestinies(destinies);
    return { ok: true, adId: 'LOCAL-AD-' + Date.now(), unlockedIndices: d.unlockedIndices, adWatched: idx !== 0 };
  }

  function localGenerateReply(id) {
    const records = loadRecords();
    const r = records.find(x => x.id === id);
    if (!r) return { ok: false, error: '记录不存在' };
    if (!r.reply) {
      r.reply = generateReply();
      saveRecords(records);
    }
    // 确保命运轨迹存在
    localGetDestiny(id);
    return { ok: true, reply: r.reply, destinyId: `DST-${id}`, aiEnabled: false };
  }

      if (!r.reply && Date.now() >= r.replyAt) {
        r.reply = generateReply();
        changed = true;
      }

    if (changed) {
      saveRecords(records);
      if (state.currentPage === 'archive') {
        renderArchive();

  // ==================== Release Page Handlers ====================
  let placeholderIdx = 0;
  let placeholderTimer = null;

  function attachReleaseHandlers() {
    const feelingText = $('feelingText');
    const micBtn = $('micBtn');
    const creatureChips = $('creatureChips');
    const feedbackOptions = $('feedbackOptions');
    const fbDate = $('fbDate');
    const releaseBtn = $('releaseBtn');
    const worldMap = $('worldMap');
    const mapSvg = $('mapSvg');
    const mapHint = $('mapHint');

    // Restore feeling text
    if (feelingText) {
      feelingText.value = state.feeling;
      feelingText.addEventListener('input', () => {
        state.feeling = feelingText.value;
        updateReleaseBtn();
      });
    }

    // Placeholder rotation
    if (placeholderTimer) clearInterval(placeholderTimer);
    placeholderIdx = 0;
    placeholderTimer = setInterval(() => {
      if (feelingText && document.activeElement !== feelingText && !state.isReleased) {
        feelingText.placeholder = PLACEHOLDERS[placeholderIdx];
      }
      placeholderIdx = (placeholderIdx + 1) % PLACEHOLDERS.length;
    }, 3500);

    // Mic button (Web Speech API if available)
    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let isRecording = false;

    if (SpeechRec) {
      recognition = new SpeechRec();
      recognition.lang = 'zh-CN';
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.onresult = (e) => {
        let transcript = '';
        for (let i = 0; i < e.results.length; i++) {
          transcript += e.results[i][0].transcript;
        }
        if (feelingText) {
          feelingText.value = transcript;
          state.feeling = transcript;
          updateReleaseBtn();
        }
      };
      recognition.onend = () => {
        isRecording = false;
        if (micBtn) {
          micBtn.classList.remove('recording');
          micBtn.textContent = '🎤';
        }
      };
      recognition.onerror = () => {
        isRecording = false;
        if (micBtn) {
          micBtn.classList.remove('recording');
          micBtn.textContent = '🎤';
        }
      };
    }

    if (micBtn) {
      micBtn.addEventListener('click', () => {
        if (state.isReleased) return;
        if (!recognition) {
          if (feelingText) feelingText.focus();
          return;
        }
        if (isRecording) {
          recognition.stop();
          return;
        }
        try {
          recognition.start();
          isRecording = true;
          micBtn.classList.add('recording');
          micBtn.textContent = '●';
        } catch(_) {}
      });
    }

    // Creature chips
    if (creatureChips) {
      creatureChips.addEventListener('click', (e) => {
        const btn = e.target.closest('[data-creature]');
        if (!btn || state.isReleased) return;
        creatureChips.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        state.creature = btn.dataset.creature;
        updateCreatureDisplay();
        updateReleaseBtn();
      });
    }

    // World map drag
    function setMapViewBox() {
      if (mapSvg) mapSvg.setAttribute('viewBox', `${mapVb.x} ${mapVb.y} ${MAP_VB.w} ${MAP_VB.h}`);
    }

    function panToWater(waterId) {
      const c = WATER_COORDS[waterId];
      if (!c) return;
      mapVb.x = Math.max(MAP_BOUNDS.minX, Math.min(MAP_BOUNDS.maxX, c.x - MAP_VB.w / 2));
      mapVb.y = Math.max(MAP_BOUNDS.minY, Math.min(MAP_BOUNDS.maxY, c.y - MAP_VB.h / 2));
      setMapViewBox();
    }

    function onDocPointerMove(e) {
      if (!mapDrag.active) return;
      const dx = e.clientX - mapDrag.startX;
      const dy = e.clientY - mapDrag.startY;
      if (Math.abs(dx) > 4 || Math.abs(dy) > 4) mapDrag.moved = true;
      if (!mapSvg) return;
      const rect = mapSvg.getBoundingClientRect();
      const scaleX = MAP_VB.w / rect.width;
      const scaleY = MAP_VB.h / rect.height;
      mapVb.x = Math.max(MAP_BOUNDS.minX, Math.min(MAP_BOUNDS.maxX, mapDrag.vbX - dx * scaleX));
      mapVb.y = Math.max(MAP_BOUNDS.minY, Math.min(MAP_BOUNDS.maxY, mapDrag.vbY - dy * scaleY));
      setMapViewBox();
    }

    function onDocPointerUp() {
      mapDrag.active = false;
      if (worldMap) worldMap.classList.remove('dragging');
      document.removeEventListener('pointermove', onDocPointerMove);
      document.removeEventListener('pointerup', onDocPointerUp);
    }

    if (worldMap) {
      worldMap.addEventListener('pointerdown', (e) => {
        if (state.isReleased) return;
        mapDrag.active = true;
        mapDrag.moved = false;
        mapDrag.startX = e.clientX;
        mapDrag.startY = e.clientY;
        mapDrag.vbX = mapVb.x;
        mapDrag.vbY = mapVb.y;
        worldMap.classList.add('dragging');
        if (mapHint) mapHint.classList.add('hidden');
        document.addEventListener('pointermove', onDocPointerMove);
        document.addEventListener('pointerup', onDocPointerUp);
      });
    }

    // Water marker clicks
    document.querySelectorAll('.water-marker').forEach(marker => {
      marker.addEventListener('click', (e) => {
        e.stopPropagation();
        if (mapDrag.moved || state.isReleased) return;
        selectWater(marker.dataset.water);
      });
    });

    // Hot bubbles
    document.querySelectorAll('.hot-bubble').forEach(bubble => {
      bubble.addEventListener('click', (e) => {
        e.stopPropagation();
        if (state.isReleased) return;
        panToWater(bubble.dataset.water);
        selectWater(bubble.dataset.water);
      });
    });

    // Feedback options
    if (feedbackOptions) {
      feedbackOptions.addEventListener('click', (e) => {
        const btn = e.target.closest('[data-fb]');
        if (!btn || state.isReleased) return;
        feedbackOptions.querySelectorAll('.fb-opt').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.feedbackTime = btn.dataset.fb;
        if (state.feedbackTime === 'custom') {
          if (fbDate) {
            fbDate.style.display = 'block';
            fbDate.focus();
          }
        } else {
          if (fbDate) fbDate.style.display = 'none';
          state.feedbackDate = '';
        }
      });
    }

    if (fbDate) {
      fbDate.addEventListener('change', () => {
        state.feedbackDate = fbDate.value;
      });
    }

    // Release button
    if (releaseBtn) {
      releaseBtn.addEventListener('click', triggerRelease);
    }
  }

  function updateReleaseBtn() {
    const btn = $('releaseBtn');
    if (!btn) return;
    const ready = state.feeling.trim() && state.creature && state.water && !state.isReleased;
    btn.disabled = !ready;
    btn.textContent = state.isReleased ? '正在放生…' : (ready ? '按下放生' : '选好啦 · 按下放生');

    if (selectedSpan) selectedSpan.textContent = WATERS[waterId].name;
    const mapHint = $('mapHint');
    if (mapHint) mapHint.classList.add('hidden');
    updateReleaseBtn();

    state.water = null;
    state.feeling = '';
    state.feedbackTime = '24h';
    state.feedbackDate = '';
    mapVb.x = 380;
    mapVb.y = 60;
    setTimeout(() => {
      if (state.currentPage === 'release') {
        renderRelease();
      }
    }, 300);
  }

  // Click overlay to close
  $('receiptOverlay').addEventListener('click', (e) => {
    if (e.target === $('receiptOverlay')) {
      closeReceipt();
    }
  });

  // ==================== Archive Page Render ====================
  async function renderArchive() {
    let stats, records;
    if (USE_API) {
      try {
        const data = await apiGetRecords(state.openid);
        stats = data.stats;
        records = data.records;
      } catch (e) {
        console.error('[renderArchive] 加载后端记录失败:', e);
        alert('加载档案失败：' + e.message);
        return;
      }
    } else {
      stats = getStats();
      records = loadRecords();
    }

    let listHtml;
    if (records.length === 0) {
      listHtml = '<div class="empty-state">还没有放生记录<br>去放生一只吧 🐟</div>';
    } else {
      listHtml = records.map((r, i) => {
        const creature = CREATURES[r.creature] || { name: r.creature, emoji: '🐟' };
        const water = WATERS[r.water] || { name: r.water };
        const hasReply = !!r.reply;
        const timeStr = formatTime(r.createdAt);

        let inner = `
          <div class="record-header">
            <span class="record-id mono">${r.id}</span>
            <span class="record-status ${hasReply ? 'replied' : 'pending'}">${hasReply ? '已回信' : '待回信'}</span>
          </div>
          <div class="record-meta">${creature.emoji} ${creature.name} · ${water.name} · ${timeStr}</div>
          <div class="record-feeling">"${r.feeling}"</div>
        `;

        if (hasReply) {
          inner += `
            <div class="reply-block">
              <div class="reply-inner">
                <div class="reply-label">📬 AI 回信 · ${r.feedbackLabel}</div>
                <div class="reply-image" style="background: ${r.reply.image ? `url('${r.reply.image}'), ` : ''}${r.reply.bg};">${r.reply.emoji}</div>
                <div class="reply-text">${r.reply.text}</div>
                <div class="destiny-entry" data-record-id="${r.id}">
                  <span class="destiny-entry-label">✨ 命运轨迹</span>
                  <span class="destiny-entry-progress">查看 ›</span>
                </div>
              </div>
            </div>
          `;
        } else {
          inner += `
            <div class="countdown-block" data-reply-at="${r.replyAt}">
              ⏳ 回信倒计时 <span class="countdown-time">${formatCountdown(r.replyAt - Date.now())}</span>
            </div>
          `;
        }

        return `<div class="record-card ${hasReply ? 'has-reply' : ''}" data-idx="${i}">${inner}</div>`;
      }).join('');
    }

    $('archiveContent').innerHTML = `
      <div class="archive-panel">
        <div class="user-bar">
          <div class="user-avatar">微</div>
          <div class="user-info">
            <div class="user-name">微信用户</div>
            <div class="user-id">ID ····3a7f</div>
          </div>
          <span class="login-tag">静默登录</span>
        </div>
        <div class="stats-row">
          <div class="stat-item">
            <div class="stat-num teal">${stats.total}</div>
            <div class="stat-label">累计放生</div>
          </div>
          <div class="stat-item">
            <div class="stat-num coral">${stats.pending}</div>
            <div class="stat-label">待回信</div>
          </div>
          <div class="stat-item">
            <div class="stat-num teal">${stats.replied}</div>
            <div class="stat-label">已回信</div>
          </div>
        </div>
        <div class="record-list" id="recordList">${listHtml}</div>
      </div>
    `;

    attachArchiveHandlers();
  }

  // ==================== Archive Page Handlers ====================
  function attachArchiveHandlers() {
    const list = $('recordList');
    if (!list) return;

    list.querySelectorAll('.record-card.has-reply').forEach(card => {
      card.addEventListener('click', (e) => {
        // 点击命运轨迹入口时不折叠/展开回信
        if (e.target.closest('.destiny-entry')) return;
        const replyBlock = card.querySelector('.reply-block');
        if (replyBlock) {
          replyBlock.classList.toggle('expanded');
        }
      });
    });

    // 命运轨迹入口
    list.querySelectorAll('.destiny-entry').forEach(entry => {
      entry.addEventListener('click', (e) => {
        e.stopPropagation();
        const recordId = entry.dataset.recordId;
        openDestinyModal(recordId);
      });
    });
  }

  // ==================== Destiny Modal (命运轨迹) ====================
  let destinyState = {
    recordId: null,
    data: null,
    loading: false
  };

  function showPayToast(msg) {
    const toast = $('destinyPayToast');
    if (!toast) return;
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1800);
  }

  async function openDestinyModal(recordId) {
    destinyState.recordId = recordId;
    destinyState.data = null;
    destinyState.loading = true;
    renderDestinyModal();
    $('destinyOverlay').classList.add('show');

    try {
      const data = await apiGetDestiny(recordId);
      destinyState.data = data;
    } catch (e) {
      destinyState.data = { error: '加载失败' };
    } finally {
      destinyState.loading = false;
      renderDestinyModal();
    }
  }

  function closeDestinyModal() {
    $('destinyOverlay').classList.remove('show');
    destinyState.recordId = null;
    destinyState.data = null;
    destinyState.loading = false;
  }

  function renderDestinyModal() {
    const modal = $('destinyModal');
    if (!modal) return;

    if (destinyState.loading) {
      modal.innerHTML = `
        <div class="destiny-loading">
          <div class="spinner"></div>
          <div>正在召唤命运轨迹…</div>
        </div>
      `;
      return;
    }

    const d = destinyState.data;
    if (!d || d.error) {
      modal.innerHTML = `
        <div class="destiny-header">
          <div class="destiny-title">命运轨迹</div>
          <div class="destiny-subtitle">DESTINY TRAJECTORY</div>
        </div>
        <div class="destiny-loading">${d && d.error ? d.error : '加载失败'}</div>
        <div class="destiny-actions">
          <button class="destiny-close-btn" onclick="document.getElementById('destinyOverlay').classList.remove('show')">关闭</button>
        </div>
      `;
      return;
    }

    const segmentsHtml = d.segments.map(seg => {
      if (seg.locked) {
        const isFree = seg.unlockType === 'free' || seg.index === 0;
        const btnText = isFree ? '免费解锁' : '📺 看广告解锁';
        return `
          <div class="destiny-segment locked">
            <div class="destiny-seg-banner" style="background: ${seg.bg};">
              <span class="destiny-seg-index">第 ${seg.index + 1} 段</span>
              <span>${seg.emoji}</span>
              <div class="destiny-lock-overlay">
                <div class="destiny-lock-icon">🔒</div>
                <div class="destiny-lock-hint">${isFree ? '免费' : '看广告解锁'}</div>
              </div>
            </div>
            <div class="destiny-seg-body">
              <div class="destiny-seg-title">${seg.title}</div>
              <button class="destiny-seg-unlock-btn" data-unlock-index="${seg.index}" data-needs-ad="${isFree ? '0' : '1'}">
                ${btnText}
              </button>
            </div>
          </div>
        `;
      }
      return `
        <div class="destiny-segment">
          <div class="destiny-seg-banner" style="background: ${seg.bg};">
            <span class="destiny-seg-index">第 ${seg.index + 1} 段</span>
            <span>${seg.emoji}</span>
          </div>
          <div class="destiny-seg-body">
            <div class="destiny-seg-title">${seg.title}</div>
            <div class="destiny-seg-text">${seg.text}</div>
          </div>
        </div>
      `;
    }).join('');

    const allUnlocked = d.allUnlocked;
    const bundleBtnHtml = allUnlocked
      ? ''
      : `<button class="destiny-bundle-btn" id="destinyBundleBtn">📺 看广告 · 一次解锁全部</button>`;

    modal.innerHTML = `
      <div class="destiny-header">
        <div class="destiny-title">命运轨迹</div>
        <div class="destiny-subtitle">DESTINY TRAJECTORY</div>
        <div class="destiny-record-id">${d.recordId}</div>
      </div>
      <div>${segmentsHtml}</div>
      <div class="destiny-actions">
        ${bundleBtnHtml}
        <button class="destiny-close-btn" id="destinyCloseBtn">关闭</button>
      </div>
    `;

    // 绑定解锁按钮
    modal.querySelectorAll('.destiny-seg-unlock-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const idx = parseInt(btn.dataset.unlockIndex, 10);
        const needsAd = btn.dataset.needsAd === '1';
        btn.disabled = true;
        const originalText = btn.textContent;

        if (needsAd) {
          // 看广告流程
          const adOk = await watchAd(d.adDurationMs || 15000);
          if (!adOk) {
            showPayToast('广告未完成，解锁失败');
            btn.disabled = false;
            btn.textContent = originalText;
            return;
          }
        }

        btn.textContent = '解锁中…';
        try {
          const res = await apiUnlockDestiny(destinyState.recordId, 'single', idx);
          if (res.ok) {
            showPayToast(idx === 0 ? '已解锁（免费）' : '广告观看完成，已解锁');
            destinyState.data = await apiGetDestiny(destinyState.recordId);
            renderDestinyModal();
          } else {
            showPayToast(res.error || '解锁失败');
            btn.disabled = false;
            btn.textContent = originalText;
          }
        } catch (e) {
          showPayToast('解锁失败');
          btn.disabled = false;
          btn.textContent = originalText;
        }
      });
    });

    const bundleBtn = $('destinyBundleBtn');
    if (bundleBtn) {
      bundleBtn.addEventListener('click', async () => {
        bundleBtn.disabled = true;
        const oldText = bundleBtn.textContent;
        // 看广告流程
        const adOk = await watchAd(d.adDurationMs || 15000);
        if (!adOk) {
          showPayToast('广告未完成，解锁失败');
          bundleBtn.disabled = false;
          bundleBtn.textContent = oldText;
          return;
        }
        bundleBtn.textContent = '解锁中…';
        try {
          const res = await apiUnlockDestiny(destinyState.recordId, 'bundle');
          if (res.ok) {
            showPayToast('广告观看完成，全部解锁');
            destinyState.data = await apiGetDestiny(destinyState.recordId);
            renderDestinyModal();
          } else {
            showPayToast(res.error || '解锁失败');
            bundleBtn.disabled = false;
            bundleBtn.textContent = oldText;
          }
        } catch (e) {
          showPayToast('解锁失败');
          bundleBtn.disabled = false;
          bundleBtn.textContent = oldText;
        }
      });
    }

    const closeBtn = $('destinyCloseBtn');
    if (closeBtn) {
      closeBtn.addEventListener('click', closeDestinyModal);
    }
  }

  // ==================== Ad Watching (激励视频模拟) ====================
  // 返回 Promise<boolean>，true 表示观看完成
  function watchAd(durationMs) {
    return new Promise((resolve) => {
      const overlay = $('adOverlay');
      const numEl = $('adCountdownNum');
      const closeBtn = $('adCloseBtn');
      if (!overlay || !numEl || !closeBtn) {
        // 没有广告 UI，直接放行（本地降级）
        resolve(true);
        return;
      }

      const totalSec = Math.max(5, Math.round(durationMs / 1000));
      let remaining = totalSec;
      numEl.textContent = remaining;
      closeBtn.disabled = true;
      closeBtn.textContent = `请观看 ${remaining}s`;
      overlay.classList.add('show');

      const timer = setInterval(() => {
        remaining -= 1;
        numEl.textContent = remaining;
        if (remaining > 0) {
          closeBtn.textContent = `请观看 ${remaining}s`;
        } else {
          clearInterval(timer);
          closeBtn.disabled = false;
          closeBtn.textContent = '领取奖励';
        }
      }, 1000);

      // 倒计时结束后点击"领取奖励"视为观看完成
      const handler = () => {
        if (closeBtn.disabled) return;
        clearInterval(timer);
        closeBtn.removeEventListener('click', handler);
        overlay.classList.remove('show');
        resolve(true);
      };
      closeBtn.addEventListener('click', handler);
    });
  }

  // 点击遮罩关闭命运轨迹
  $('destinyOverlay').addEventListener('click', (e) => {
    if (e.target === $('destinyOverlay')) {
      closeDestinyModal();
    }
  });

  // ==================== Nav Toggle ====================
  document.querySelectorAll('.nav-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      navigateTo(pill.dataset.page);
    });
  });

  // ==================== Countdown Timer ====================
  setInterval(() => {
    checkPendingReplies();
    if (state.currentPage === 'archive') {
      document.querySelectorAll('.countdown-block').forEach(el => {
        const replyAt = parseInt(el.dataset.replyAt);
        const timeEl = el.querySelector('.countdown-time');
        if (timeEl) {
          timeEl.textContent = formatCountdown(replyAt - Date.now());
        }
      });
    }
  }, 1000);

  // ==================== Init ====================
  seedDemoData();
  checkPendingReplies();
  navigateTo('release');

})();
</script>
